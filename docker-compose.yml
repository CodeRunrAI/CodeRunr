services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
      POSTGRES_DB: coderunr
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sandbox -d coderunr"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  localstack:
    image: localstack/localstack:3
    restart: unless-stopped
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      - SERVICES=sqs
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_SQS_QUEUE_NAME=Coderunr_queue.fifo
    volumes:
      - "./.localstack:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./scripts/init-localstack.sh:/etc/localstack/init/ready.d/init-localstack.sh"
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    environment:
      ENVIRONMENT: prod
      SERVICE_MODE: api
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
      POSTGRES_DB: coderunr
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_SQS_QUEUE_NAME: Coderunr_queue_1.fifo
      AWS_SQS_QUEUE_URL: "http://localstack:4566/000000000000/Coderunr_queue.fifo"
      AWS_REGION: test
      AWS_ENDPOINT_URL: http://localstack:4566
      AUTH_TOKEN: test
    ports:
      - 8080:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      ENVIRONMENT: prod
      SERVICE_MODE: worker
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
      POSTGRES_DB: coderunr
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_SQS_QUEUE_NAME: Coderunr_queue_1.fifo
      AWS_SQS_QUEUE_URL: "http://localstack:4566/000000000000/Coderunr_queue.fifo"
      AWS_REGION: test
      AWS_ENDPOINT_URL: http://localstack:4566
      AUTH_TOKEN: test
    privileged: true
    cgroup: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /tmp:exec,size=512M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy

  lambda:
    build:
      context: .
      dockerfile: Dockerfile.lambda
    ports:
      - "8765:8080"
    environment:
      AUTH_TOKEN: test
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
      POSTGRES_DB: coderunr
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      AWS_SQS_QUEUE_NAME: Coderunr_queue_1.fifo
      AWS_SQS_QUEUE_URL: "http://localstack:4566/000000000000/Coderunr_queue.fifo"
      AWS_ENDPOINT_URL: http://localstack:4566
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_healthy
