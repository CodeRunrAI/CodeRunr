services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
      POSTGRES_DB: coderunr
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sandbox -d coderunr"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    environment:
      ENVIRONMENT: prod
      SERVICE_MODE: api
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
      POSTGRES_DB: coderunr
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AUTH_TOKEN: ${AUTH_TOKEN}
    ports:
      - 8080:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      ENVIRONMENT: prod
      SERVICE_MODE: worker
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
      POSTGRES_DB: coderunr
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AUTH_TOKEN: ${AUTH_TOKEN}
    privileged: true
    cgroup: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /tmp:exec,size=512M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
